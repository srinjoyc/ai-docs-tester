id: zerodev-02-batch-mint
vendor: zerodev
title: Batch two NFT mints into a single gas-free transaction
difficulty: 2
tags: [basic, batching]

prompt: |
  I want users to mint two NFTs with a single click — one on-chain transaction,
  no double confirmations, and no gas fees.

  Add a "Batch Mint" button to the app that:
  - Sends both mint() calls to NFT_CONTRACT atomically in one UserOperation
  - Sponsors gas via the ZeroDev paymaster so the user pays nothing
  - Displays the transaction hash when done

  Files available: src/lib/config.ts (NFT_CONTRACT, NFT_ABI, BUNDLER_URL,
  PAYMASTER_URL), src/components/MintButton.tsx.
  Packages installed: @zerodev/sdk, @zerodev/ecdsa-validator, permissionless, viem.

expected:
  imports:
    - "@zerodev/sdk"
    - "@zerodev/ecdsa-validator"
    - "viem"
  calls:
    - "createKernelAccount"
    - "createKernelAccountClient"
    - "sendTransaction"
  forbidden:
    - "ethers"
  chain: arbitrumSepolia

grader:
  type: e2e
  setup: ./graders/zerodev-base/setup.sh
  run: ./graders/zerodev-base/e2e.sh
  env:
    ACTION_BUTTON_TEXT: "Batch Mint"

budget:
  max_turns: 8
  max_seconds: 240

human_check:
  start_command: "npm run dev"
  url: "http://localhost:3000"
  what_to_do: >
    Click "Batch Mint". Should send both mints in one transaction and display the
    hash. No second confirmation prompt should appear.
  checklist:
    - "Page loads with no console errors"
    - "'Batch Mint' button is visible"
    - "Clicking shows a single transaction hash"
    - "No second approval prompt appears"
