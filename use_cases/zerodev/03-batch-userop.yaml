id: zerodev-03-session-key-mint
vendor: zerodev
title: Auto-mint NFTs via session key without per-transaction approvals
difficulty: 3
tags: [session-keys, permissions]

prompt: |
  My app needs to mint NFTs on behalf of users automatically — without a wallet
  pop-up every single time. I want to create a session key on page load that has
  permission to mint, then use it silently when the user clicks "Mint NFT".

  Set it up so that:
  - On page load, a session key is created with permission to call NFT_CONTRACT
  - Clicking "Mint NFT" uses the session key to send the mint UserOperation — no
    wallet approval required per transaction
  - The transaction hash is displayed on success

  Files available: src/lib/config.ts (NFT_CONTRACT, NFT_ABI, BUNDLER_URL,
  PAYMASTER_URL), src/components/MintButton.tsx.
  Packages installed: @zerodev/sdk, @zerodev/ecdsa-validator, @zerodev/permissions,
  permissionless, viem.

expected:
  imports:
    - "@zerodev/sdk"
    - "@zerodev/permissions"
    - "viem"
  calls:
    - "createKernelAccount"
    - "toECDSASigner"
    - "toPermissionValidator"
  forbidden:
    - "ethers"
  chain: arbitrumSepolia

grader:
  type: e2e
  setup: ./graders/zerodev-base/setup.sh
  run: ./graders/zerodev-base/e2e.sh

budget:
  max_turns: 12
  max_seconds: 360

human_check:
  start_command: "npm run dev"
  url: "http://localhost:3000"
  what_to_do: >
    Load the page. Session key should be created silently on mount. Click
    "Mint NFT" — no wallet pop-up should appear, just the transaction hash.
  checklist:
    - "Page loads with no console errors"
    - "Session key setup completes silently on mount"
    - "'Mint NFT' button is visible"
    - "Clicking it shows a transaction hash without a wallet approval prompt"
