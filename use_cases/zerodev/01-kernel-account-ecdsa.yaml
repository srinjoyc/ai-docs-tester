id: zerodev-01-kernel-mint
vendor: zerodev
title: Mint an NFT gas-free using a ZeroDev smart account
difficulty: 1
tags: [basic, gas-sponsorship]

prompt: |
  I want users to be able to mint an NFT without paying any gas fees. I heard
  ZeroDev can handle this with a smart account — can you set that up?

  The app already has a "Mint NFT" button wired to a basic EOA transaction.
  Upgrade it so the mint uses ZeroDev to sponsor gas, so the user pays nothing.

  After minting, display the transaction hash on the page.

expected:
  imports:
    - "@zerodev/sdk"
    - "@zerodev/ecdsa-validator"
    - "viem"
  calls:
    - "createKernelAccount"
    - "createKernelAccountClient"
    - "createZeroDevPaymasterClient"
    - "signerToEcdsaValidator"
  forbidden:
    - "ethers"
  chain: arbitrumSepolia

scaffold:
  setup: ./scaffolds/zerodev-clean-base/setup.sh

grader:
  type: e2e
  run: ./graders/zerodev-base/e2e.sh

budget:
  max_turns: 10
  max_seconds: 300

human_check:
  start_command: "npm run dev"
  url: "http://localhost:3000"
  what_to_do: >
    Click "Mint NFT". Should complete without the user paying gas and show a
    transaction hash.
  checklist:
    - "Page loads with no console errors"
    - "'Mint NFT' button is visible after connecting wallet"
    - "Clicking it shows a transaction hash (0x...)"
    - "No gas fee prompt appears"
