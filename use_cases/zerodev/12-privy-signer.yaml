id: zerodev-08-privy-signer
vendor: zerodev
title: Use a Privy embedded wallet as the signer for a ZeroDev smart account
difficulty: 3
tags: [basic, integration:privy]

# Integration use case: tests ZeroDev docs on using Privy as the smart account signer.
# Compare pass rates against privy-side docs to identify which explains it better.

prompt: |
  Users should be able to log in with email or social (via Privy) and mint an NFT
  through a smart account — no MetaMask required, and no gas fees.

  After the user logs in:
  - Show both their Privy wallet address and their ZeroDev smart account address
  - "Mint NFT" should use the Privy embedded wallet as the signer for a ZeroDev
    Kernel smart account, send the mint as a sponsored UserOperation, and display
    the userOp hash

  Files available: src/lib/config.ts (NFT_CONTRACT, NFT_ABI, BUNDLER_URL,
  PAYMASTER_URL, PRIVY_APP_ID), src/components/MintButton.tsx,
  src/lib/kernelAccount.ts (create this file).
  Packages installed: @privy-io/react-auth, @zerodev/sdk, @zerodev/ecdsa-validator,
  permissionless, viem.

expected:
  imports:
    - "@privy-io/react-auth"
    - "@zerodev/sdk"
    - "@zerodev/ecdsa-validator"
    - "permissionless"
    - "viem"
  calls:
    - "useWallets"
    - "createKernelAccount"
    - "createKernelAccountClient"
    - "walletClientToSmartAccountSigner"
    - "createZeroDevPaymasterClient"
  forbidden:
    - "ethers"
  chain: arbitrumSepolia

grader:
  type: compile
  setup: ./graders/privy-zerodev-base/setup.sh
  run: ./graders/privy-zerodev-base/typecheck.sh

budget:
  max_turns: 10
  max_seconds: 300

human_check:
  start_command: "npm run dev"
  url: "http://localhost:3000"
  what_to_do: >
    Log in with Privy, then click "Mint NFT". Both the Privy EOA address and
    the smart account address should be shown, followed by a userOp hash.
  checklist:
    - "Privy login modal appears and completes"
    - "Privy wallet address and smart account address both displayed after login"
    - "Clicking 'Mint NFT' shows a userOp hash (0x...)"
    - "No MetaMask or browser wallet prompt appears"
