id: zerodev-06-session-key-mint
vendor: zerodev
title: Add a session key that can mint on behalf of the user (scoped, 24h TTL)
difficulty: 4
tags: [session-keys, permissions]

prompt: |
  The starter app is a Next.js-style TypeScript app where a user mints an NFT
  via a ZeroDev Kernel smart account.

  Your task: add a session-key flow so a backend service can mint on the user's
  behalf without the user signing each transaction.

  Create a new file lib/sessionKey.ts that exports createMintSessionKey():
    - Creates a Kernel account on Sepolia from PRIVATE_KEY (lib/config.ts)
    - Generates a fresh random session key (private key)
    - Grants that session key permission to call ONLY NFT_CONTRACT (lib/config.ts),
      restricted to a single function selector (the mint function: 0x6a627842)
    - Sets the session key to expire 24 hours from now
    - Returns { sessionKeyAddress, sessionKeyClient } where sessionKeyClient is a
      KernelAccountClient that uses the session key to send userOps

  Also implement lib/account.ts with a basic getKernelClient() (no gas sponsorship
  needed for this task — just a working ECDSA Kernel client on Sepolia).

  Update components/MintButton.tsx to call createMintSessionKey() once on mount,
  then use the returned sessionKeyClient to send the mint userOp.

  Use @zerodev/permissions or @zerodev/session-key (check which is installed).
  Use viem. Read env vars from lib/config.ts.

expected:
  imports:
    - "@zerodev/sdk"
    - "@zerodev/permissions"
    - "viem"
  calls:
    - "toECDSASigner"
    - "toPermissionValidator"
  forbidden:
    - "ethers"
  chain: sepolia

grader:
  type: compile
  setup: ./graders/zerodev-base/setup.sh
  run: ./graders/zerodev-base/typecheck.sh

budget:
  max_turns: 12
  max_seconds: 300

human_check:
  start_command: "npm run dev"
  url: "http://localhost:5173"
  what_to_do: >
    Load the page. A session key should be created on mount and the MintButton
    should use it to mint without any user signature prompt.
  checklist:
    - "Page loads with no console errors"
    - "The session key creation step completes without a signature prompt"
    - "A 'Mint NFT' button is visible"
    - "Clicking it mints using the session key and shows a userOp hash"
