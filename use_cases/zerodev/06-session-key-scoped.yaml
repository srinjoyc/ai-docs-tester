id: zerodev-06-session-key-mint
vendor: zerodev
title: Add a session key that can mint on behalf of the user (scoped permission, 24h TTL)
difficulty: 4
tags: [session-keys, permissions]

prompt: |
  The app has a "Mint NFT" button connected to a ZeroDev Kernel smart account.
  Update it so that minting happens via a temporary session key instead of the main
  signer — useful for dApps that want to automate actions without asking the user
  to approve each one.

  What needs to change — only src/components/MintButton.tsx:
  - On mount (useEffect), create a session key flow:
      1. Build the main Kernel account from the connected wallet (ECDSA, BUNDLER_URL)
      2. Generate an ephemeral session key (generatePrivateKey from viem/accounts)
      3. Grant it permission to call ONLY NFT_CONTRACT using toCallPolicy and
         toPermissionValidator from @zerodev/permissions
      4. Set validity to 24 hours from now
      5. Store the resulting sessionKeyClient in React state
  - When "Mint NFT" is clicked, send the mint userOp through sessionKeyClient
  - Display the userOp hash in the status area

  @zerodev/sdk, @zerodev/ecdsa-validator, @zerodev/permissions are installed.
  Use viem, not ethers. Target Arbitrum Sepolia.

expected:
  imports:
    - "@zerodev/sdk"
    - "@zerodev/permissions"
    - "viem"
  calls:
    - "toECDSASigner"
    - "toPermissionValidator"
    - "toCallPolicy"
  forbidden:
    - "ethers"
  chain: arbitrumSepolia

grader:
  type: e2e
  setup: ./graders/zerodev-base/setup.sh
  run: ./graders/zerodev-base/e2e.sh

budget:
  max_turns: 12
  max_seconds: 300

human_check:
  start_command: "npm run dev"
  url: "http://localhost:3000"
  what_to_do: >
    Load the page. A session key should be created on mount. Clicking "Mint NFT"
    should mint via the session key (no second wallet approval) and show a hash.
  checklist:
    - "Page loads with no console errors"
    - "Session key is created silently on mount (a status like 'Session ready' may appear)"
    - "A 'Mint NFT' button is visible"
    - "Clicking it sends via session key and shows a userOp hash (0x...)"
